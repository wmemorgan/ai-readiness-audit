name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for the authorship-trace scan
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint (ruff)
        run: python -m ruff check .
      - name: Type-check (mypy)
        run: python -m mypy
      - name: Architecture contract (import-linter)
        run: lint-imports
      - name: IP firewall (Gate-1 grep + authorship-trace scan)
        run: bash scripts/ip_grep.sh
      - name: Tests
        run: python -m pytest
      - name: Eval gate (SPEC-2026-0701 — AC-1..AC-15)
        run: python eval/SPEC-2026-0701/gate.py
